name: flutter_chat_demo
description: Flutter Firebase Chat Demo
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^4.1.0
  firebase_auth: ^6.0.0
  firebase_storage: ^13.0.4
  firebase_messaging: ^16.0.4
  cloud_firestore: ^6.0.0

  # Analytics & Crashlytics
  firebase_analytics: ^12.0.0
  firebase_crashlytics: ^5.0.0

  # Authentication
  google_sign_in: ^6.2.1
  local_auth: ^3.0.0

  # Image handling
  photo_view: ^0.15.0
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  image_picker: ^1.2.0

  # UI / UX
  fluttertoast: ^9.0.0
  provider: ^6.1.0
  intl: ^0.20.0

  # Storage
  shared_preferences: ^2.5.0
  path_provider: ^2.1.0

  # QR
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.1.0

  # Notifications
  flutter_local_notifications: ^19.5.0
  timezone: ^0.10.0

  # Permissions
  permission_handler: ^12.0.0

  # Network
  connectivity_plus: ^7.0.0
  http: ^1.5.0

  # Audio
  flutter_sound: ^9.16.0
  audio_session: ^0.2.2

  # Location
  geolocator: ^14.0.2
  geocoding: ^4.0.0

  # Translation
  translator: ^1.0.0

  # URL launcher
  url_launcher: ^6.3.0

  # Encryption
  crypto: ^3.0.0

  # Offline cache (needed for OfflineManager)
  sqflite: ^2.3.2
  path: ^1.9.0

  agora_rtc_engine: ^6.3.2   # WebRTC engine
  wakelock_plus: ^1.2.8       # Keep screen on during call

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - images/
